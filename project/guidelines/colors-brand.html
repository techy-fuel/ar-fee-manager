<!-- @dsCard group="Colors" viewport="700x150" name="Brand Blue" subtitle="Primary scale — derived from the logo (#248DCE)" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--color-surface); font-family:var(--font-sans); }
  .scale { display:grid; grid-template-columns:repeat(10,1fr); gap:0; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-xs); }
  .sw { height:74px; display:flex; align-items:flex-end; padding:8px; }
  .meta { display:grid; grid-template-columns:repeat(10,1fr); margin-top:8px; }
  .meta span { font-size:var(--fs-2xs); color:var(--text-muted); text-align:center; }
  .meta b { display:block; color:var(--text-strong); font-weight:var(--fw-semibold); }
  .star { color:#fff; font-size:var(--fs-2xs); font-weight:var(--fw-bold); }
</style>
</head>
<body>
<div class="scale">
  <div class="sw" style="background:var(--blue-50)"></div>
  <div class="sw" style="background:var(--blue-100)"></div>
  <div class="sw" style="background:var(--blue-200)"></div>
  <div class="sw" style="background:var(--blue-300)"></div>
  <div class="sw" style="background:var(--blue-400)"></div>
  <div class="sw" style="background:var(--blue-500)"><span class="star">PRIMARY</span></div>
  <div class="sw" style="background:var(--blue-600)"></div>
  <div class="sw" style="background:var(--blue-700)"></div>
  <div class="sw" style="background:var(--blue-800)"></div>
  <div class="sw" style="background:var(--blue-900)"></div>
</div>
<div class="meta">
  <span><b>50</b>EAF4FB</span><span><b>100</b>D2E8F6</span><span><b>200</b>A9D2EE</span><span><b>300</b>79B8E4</span><span><b>400</b>4BA0D9</span><span><b>500</b>248DCE</span><span><b>600</b>1B73AD</span><span><b>700</b>175C8C</span><span><b>800</b>154B71</span><span><b>900</b>123C59</span>
</div>
</body>
</html>
