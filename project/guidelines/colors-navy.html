<!-- @dsCard group="Colors" viewport="700x140" name="Navy & WhatsApp" subtitle="Sidebar surface & reminder accent" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--color-surface); font-family:var(--font-sans); }
  .row { display:flex; gap:14px; }
  .cell { flex:1; height:76px; border-radius:var(--radius-md); display:flex; flex-direction:column; justify-content:flex-end; padding:10px 12px; color:#fff; }
  .cell b { font-size:var(--fs-sm); font-weight:var(--fw-bold); }
  .cell span { font-size:var(--fs-2xs); opacity:.8; font-family:var(--font-mono); }
</style>
</head>
<body>
<div class="row">
  <div class="cell" style="background:var(--navy-700)"><b>Navy 700</b><span>#14365C</span></div>
  <div class="cell" style="background:var(--navy-800)"><b>Navy 800</b><span>#0F2A49</span></div>
  <div class="cell" style="background:var(--navy-900)"><b>Navy 900 · Sidebar</b><span>#0B1F38</span></div>
  <div class="cell" style="background:var(--whatsapp)"><b>WhatsApp</b><span>#25D366</span></div>
</div>
</body>
</html>
