<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--color-surface); font-family:var(--font-sans); }
  .row { display:flex; align-items:flex-end; gap:18px; }
  .col { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar { background:var(--blue-200); border:1px solid var(--blue-300); border-radius:var(--radius-xs); width:24px; }
  .t { font-size:var(--fs-2xs); color:var(--text-muted); font-family:var(--font-mono); }
  .t b { display:block; color:var(--text-strong); }
</style>
</head>
<body>
<div class="row">
  <div class="col"><div class="bar" style="height:4px"></div><span class="t"><b>1</b>4px</span></div>
  <div class="col"><div class="bar" style="height:8px"></div><span class="t"><b>2</b>8</span></div>
  <div class="col"><div class="bar" style="height:12px"></div><span class="t"><b>3</b>12</span></div>
  <div class="col"><div class="bar" style="height:16px"></div><span class="t"><b>4</b>16</span></div>
  <div class="col"><div class="bar" style="height:24px"></div><span class="t"><b>6</b>24</span></div>
  <div class="col"><div class="bar" style="height:32px"></div><span class="t"><b>8</b>32</span></div>
  <div class="col"><div class="bar" style="height:48px"></div><span class="t"><b>12</b>48</span></div>
  <div class="col"><div class="bar" style="height:64px"></div><span class="t"><b>16</b>64</span></div>
  <div class="col"><div class="bar" style="height:80px"></div><span class="t"><b>20</b>80</span></div>
</div>
</body>
</html>
