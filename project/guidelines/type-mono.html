<!-- @dsCard group="Type" viewport="700x170" name="Mono — Figures & IDs" subtitle="IBM Plex Mono · tabular numerics" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--color-surface); font-family:var(--font-sans); color:var(--text-strong); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .box { border:1px solid var(--border-subtle); border-radius:var(--radius-md); padding:14px 16px; background:var(--color-surface-sunken); }
  .lbl { font-size:var(--fs-2xs); text-transform:uppercase; letter-spacing:var(--ls-overline); color:var(--text-faint); font-weight:var(--fw-bold); margin:0 0 8px; }
  .mono { font-family:var(--font-mono); font-size:var(--fs-h4); color:var(--text-strong); font-variant-numeric:tabular-nums; }
  .amt { font-family:var(--font-mono); font-size:var(--fs-h2); font-weight:var(--fw-semibold); }
</style>
</head>
<body>
<div class="grid">
  <div class="box"><p class="lbl">Transaction ID</p><div class="mono">TXN-9F2A7C41</div></div>
  <div class="box"><p class="lbl">Receipt No.</p><div class="mono">ARA-2025-00842</div></div>
  <div class="box"><p class="lbl">Amount Received</p><div class="amt" style="color:var(--green-600)">₨ 3,000.00</div></div>
  <div class="box"><p class="lbl">WhatsApp Number</p><div class="mono">+92 300 1234567</div></div>
</div>
</body>
</html>
