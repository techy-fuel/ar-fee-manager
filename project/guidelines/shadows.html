<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Soft cool-tinted shadows" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:26px 22px; background:var(--color-surface); font-family:var(--font-sans); }
  .row { display:flex; gap:24px; }
  .col { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .box { width:96px; height:60px; background:var(--color-surface); border:1px solid var(--border-subtle); border-radius:var(--radius-lg); }
  .t { font-size:var(--fs-2xs); color:var(--text-muted); font-family:var(--font-mono); }
  .t b { display:block; color:var(--text-strong); }
</style>
</head>
<body>
<div class="row">
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="t"><b>xs</b>inputs</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="t"><b>sm</b>cards</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="t"><b>md</b>hover</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="t"><b>lg</b>popovers</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="t"><b>xl</b>modals</span></div>
</div>
</body>
</html>
