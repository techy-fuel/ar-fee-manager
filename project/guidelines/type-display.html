<!-- @dsCard group="Type" viewport="700x200" name="Display & Headings" subtitle="Plus Jakarta Sans" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--color-surface); font-family:var(--font-sans); color:var(--text-strong); }
  .item { display:flex; align-items:baseline; gap:16px; padding:7px 0; border-bottom:1px solid var(--border-subtle); }
  .item:last-child { border-bottom:none; }
  .tag { flex:none; width:118px; font-size:var(--fs-2xs); color:var(--text-faint); font-family:var(--font-mono); }
  .d { font-size:var(--fs-display); font-weight:var(--fw-extra); letter-spacing:var(--ls-tight); }
  .h1 { font-size:var(--fs-h1); font-weight:var(--fw-bold); letter-spacing:var(--ls-tight); }
  .h2 { font-size:var(--fs-h2); font-weight:var(--fw-bold); letter-spacing:var(--ls-snug); }
  .h3 { font-size:var(--fs-h3); font-weight:var(--fw-semibold); }
</style>
</head>
<body>
  <div class="item"><span class="tag">Display / 40 / 800</span><span class="d">Rs 3,42,000</span></div>
  <div class="item"><span class="tag">H1 / 32 / 700</span><span class="h1">Fee Collection</span></div>
  <div class="item"><span class="tag">H2 / 24 / 700</span><span class="h2">Student Management</span></div>
  <div class="item"><span class="tag">H3 / 20 / 600</span><span class="h3">Monthly Reports</span></div>
</body>
</html>
