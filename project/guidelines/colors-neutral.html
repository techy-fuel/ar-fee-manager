<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Slate" subtitle="Text, borders, surfaces" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--color-surface); font-family:var(--font-sans); }
  .scale { display:grid; grid-template-columns:repeat(10,1fr); gap:0; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-xs); border:1px solid var(--border-subtle); }
  .sw { height:74px; }
  .meta { display:grid; grid-template-columns:repeat(10,1fr); margin-top:8px; }
  .meta span { font-size:var(--fs-2xs); color:var(--text-muted); text-align:center; }
  .meta b { display:block; color:var(--text-strong); font-weight:var(--fw-semibold); }
</style>
</head>
<body>
<div class="scale">
  <div class="sw" style="background:var(--white)"></div>
  <div class="sw" style="background:var(--slate-50)"></div>
  <div class="sw" style="background:var(--slate-100)"></div>
  <div class="sw" style="background:var(--slate-200)"></div>
  <div class="sw" style="background:var(--slate-300)"></div>
  <div class="sw" style="background:var(--slate-400)"></div>
  <div class="sw" style="background:var(--slate-500)"></div>
  <div class="sw" style="background:var(--slate-600)"></div>
  <div class="sw" style="background:var(--slate-700)"></div>
  <div class="sw" style="background:var(--slate-900)"></div>
</div>
<div class="meta">
  <span><b>White</b>FFFFFF</span><span><b>50</b>F7F9FC</span><span><b>100</b>EEF2F7</span><span><b>200</b>E3E9F0</span><span><b>300</b>CDD6E2</span><span><b>400</b>9AA7B8</span><span><b>500</b>6B7889</span><span><b>600</b>4D5A6B</span><span><b>700</b>374352</span><span><b>900</b>131B27</span>
</div>
</body>
</html>
