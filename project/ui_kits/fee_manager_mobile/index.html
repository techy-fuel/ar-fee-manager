<!-- @startingPoint section="Fee Manager" subtitle="Mobile companion app — dashboard, students, collect, reminders" viewport="900x940" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Al Rehman Fee Manager — Mobile</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { height: 100%; }
  body { margin: 0; background: #e9eef5; display: grid; place-items: center; min-height: 100vh; }
  #root { padding: 28px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="../fee_manager/icons.jsx"></script>
<script type="text/babel" src="../fee_manager/data.jsx"></script>
<script type="text/babel" src="../fee_manager/charts.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="mobile.jsx"></script>
<script type="text/babel">
const { IOSDevice } = window;
const { Icon, MOBILE_SCREENS, MOBILE_MORE } = window;

const TABS = [
  { key: 'dashboard', label: 'Home', icon: 'dashboard' },
  { key: 'students', label: 'Students', icon: 'users' },
  { key: 'collect', label: 'Collect', icon: 'scan', center: true },
  { key: 'reminders', label: 'Remind', icon: 'phone' },
  { key: 'more', label: 'More', icon: 'more' },
];

function TabBar({ active, onChange }) {
  return (
    <div style={{
      flex: 'none', display: 'flex', alignItems: 'center', justifyContent: 'space-around',
      background: 'rgba(255,255,255,0.92)', backdropFilter: 'blur(12px)',
      borderTop: '1px solid var(--border-subtle)', padding: '8px 8px 30px',
    }}>
      {TABS.map((t) => {
        const on = active === t.key;
        if (t.center) {
          return (
            <button key={t.key} onClick={() => onChange(t.key)} style={{
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
              border: 'none', background: 'transparent', cursor: 'pointer', flex: 1,
            }}>
              <span style={{ width: 46, height: 46, marginTop: -22, borderRadius: '50%', background: 'var(--color-primary)', color: '#fff', display: 'grid', placeItems: 'center', boxShadow: '0 6px 16px rgba(36,141,206,0.45)', border: '3px solid #fff' }}>
                <Icon name={t.icon} size={22} />
              </span>
              <span style={{ fontSize: 10.5, fontWeight: 700, color: on ? 'var(--color-primary)' : 'var(--text-muted)', fontFamily: 'var(--font-sans)' }}>{t.label}</span>
            </button>
          );
        }
        return (
          <button key={t.key} onClick={() => onChange(t.key)} style={{
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
            border: 'none', background: 'transparent', cursor: 'pointer', flex: 1,
            color: on ? 'var(--color-primary)' : 'var(--text-faint)',
          }}>
            <Icon name={t.icon} size={22} strokeWidth={on ? 2.4 : 2} />
            <span style={{ fontSize: 10.5, fontWeight: on ? 700 : 600, fontFamily: 'var(--font-sans)' }}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function MobileApp() {
  const [tab, setTab] = React.useState('dashboard');
  const [sub, setSub] = React.useState(null); // a key in MOBILE_MORE (excluding 'more')

  let Screen, screenProps = {};
  if (sub) {
    Screen = MOBILE_MORE[sub];
    screenProps = { onBack: () => setSub(null) };
  } else if (tab === 'more') {
    Screen = MOBILE_MORE.more;
    screenProps = { onOpen: (k) => setSub(k) };
  } else {
    Screen = MOBILE_SCREENS[tab];
  }
  const moreActive = tab === 'more';
  return (
    <IOSDevice>
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--color-bg)' }}>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 }}>
          <Screen {...screenProps} />
        </div>
        <TabBar active={moreActive ? 'more' : tab} onChange={(k) => { setSub(null); setTab(k); }} />
      </div>
    </IOSDevice>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<MobileApp />);
</script>
</body>
</html>
