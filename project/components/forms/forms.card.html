<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style> body { margin: 0; padding: 24px; background: var(--color-bg); } </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Input, Select } = window.AlRehmanFeeManagerDesignSystem_ad9d9e;
const Search = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
const Rupee = () => <span style={{fontWeight:700,fontSize:14}}>₨</span>;
function Demo() {
  return (
    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:18, maxWidth:620 }}>
      <Input label="Student Name" placeholder="e.g. Ahmed Raza" />
      <Input label="Monthly Fee" placeholder="3000" iconLeft={<Rupee/>} />
      <Input placeholder="Search students…" iconLeft={<Search/>} label="Search" />
      <Select label="Class" placeholder="Select class" options={['Class 6-A','Class 7-A','Class 7-B','Class 8-A']} />
      <Select label="Fee Month" options={['January','February','March','April']} />
      <Input label="Transaction ID" defaultValue="TXN-9F2A7" error="Already recorded" />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
